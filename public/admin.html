<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка - SportHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f5f5f5; 
            padding: 20px; 
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { 
            margin-bottom: 20px; 
            color: #333; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-primary { 
            background: #0891b2; 
            color: white; 
        }
        .btn-primary:hover { background: #067a94; }
        
        .btn-danger { 
            background: #ef4444; 
            color: white; 
        }
        .btn-danger:hover { background: #dc2626; }
        
        .btn-edit { 
            background: #3b82f6; 
            color: white; 
        }
        .btn-edit:hover { background: #2563eb; }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th { 
            background: #1f2937; 
            color: white;
            font-weight: 600;
        }
        
        tr:hover { background: #f9fafb; }
        
        .sport-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }
        
        .football { background: #dcfce7; color: #166534; }
        .basketball { background: #ffedd5; color: #9a3412; }
        .tennis { background: #dbeafe; color: #1e40af; }
        .volleyball { background: #f3e8ff; color: #6b21a8; }
        .swimming { background: #cffafe; color: #0e7490; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-group input:focus, 
        .form-group select:focus {
            outline: none;
            border-color: #0891b2;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .price { font-weight: 700; color: #0891b2; }
        
        .empty { 
            text-align: center; 
            padding: 60px; 
            color: #6b7280; 
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .back-link:hover { color: #374151; }
        
        .coords-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Вернуться на сайт</a>
        
        <h1>
            🏟️ Админка SportHub
        </h1>
        
        <button class="btn btn-primary" onclick="openModal()">+ Добавить площадку</button>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Вид спорта</th>
                    <th>Адрес</th>
                    <th>Цена/час</th>
                    <th>Координаты</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="venuesList">
                <tr><td colspan="7" class="empty">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px;">Добавить площадку</h2>
            
            <form id="venueForm">
                <input type="hidden" id="venueId">
                
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="name" required placeholder="Например: Футбольное поле Центральное">
                </div>
                
                <div class="form-group">
                    <label>Вид спорта *</label>
                    <select id="sport" required>
                        <option value="football">⚽ Футбол</option>
                        <option value="basketball">🏀 Баскетбол</option>
                        <option value="tennis">🎾 Теннис</option>
                        <option value="volleyball">🏐 Волейбол</option>
                        <option value="swimming">🏊 Бассейн</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Адрес *</label>
                    <input type="text" id="location" required placeholder="Москва, ул. Спортивная 1">
                </div>
                
                <div class="form-group">
                    <label>Цена за час (₽)</label>
                    <input type="number" id="price" value="0" min="0" step="100">
                </div>
                
                <div class="form-group">
                    <label>Широта (latitude)</label>
                    <input type="text" id="coords_lat" placeholder="55.7558">
                    <div class="coords-hint">Можно найти на <a href="https://www.google.com/maps" target="_blank">Google Maps</a> → правый клик → координаты</div>
                </div>
                
                <div class="form-group">
                    <label>Долгота (longitude)</label>
                    <input type="text" id="coords_lng" placeholder="37.6173">
                </div>
                
                <div class="form-group">
                    <label>Фото площадки</label>
                    <input type="file" id="imageFile" accept="image/*" required>
                    <div class="coords-hint">Максимум 5MB, форматы: JPG, PNG</div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let venues = [];
        
        // Защита паролем (простая)
        const password = prompt('Введите пароль администратора:');
        if (password !== 'admin123') {
            document.body.innerHTML = '<div style="text-align:center;padding:100px;"><h1>⛔ Доступ запрещён</h1></div>';
            throw new Error('Access denied');
        }
        
        // Загрузка площадок
        async function loadVenues() {
            try {
                const response = await fetch('/api/admin/venues');
                venues = await response.json();
                renderVenues();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('venuesList').innerHTML = 
                    '<tr><td colspan="7" class="empty">Ошибка загрузки данных</td></tr>';
            }
        }
        
        // Отрисовка таблицы
        function renderVenues() {
            const tbody = document.getElementById('venuesList');
            
            if (venues.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">Нет площадок. Добавьте первую!</td></tr>';
                return;
            }
            
            tbody.innerHTML = venues.map(v => `
                <tr>
                    <td>${v.id}</td>
                    <td><strong>${v.name}</strong></td>
                    <td><span class="sport-tag ${v.sport}">${getSportName(v.sport)}</span></td>
                    <td>${v.location}</td>
                    <td class="price">${v.price.toLocaleString()} ₽</td>
                    <td>${v.coords_lat || '-'}, ${v.coords_lng || '-'}</td>
                    <td>
                        <button class="btn btn-edit" onclick="editVenue(${v.id})" style="margin-right: 8px;">✏️</button>
                        <button class="btn btn-danger" onclick="deleteVenue(${v.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getSportName(sport) {
            const names = {
                football: 'Футбол',
                basketball: 'Баскетбол', 
                tennis: 'Теннис',
                volleyball: 'Волейбол',
                swimming: 'Бассейн'
            };
            return names[sport] || sport;
        }
        
        // Открыть модалку
        function openModal(venue = null) {
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalTitle').textContent = 
                venue ? 'Редактировать площадку' : 'Добавить площадку';
            
            if (venue) {
                document.getElementById('venueId').value = venue.id;
                document.getElementById('name').value = venue.name;
                document.getElementById('sport').value = venue.sport;
                document.getElementById('location').value = venue.location;
                document.getElementById('price').value = venue.price;
                document.getElementById('coords_lat').value = venue.coords_lat || '';
                document.getElementById('coords_lng').value = venue.coords_lng || '';
                document.getElementById('image').value = venue.image || '';
            } else {
                document.getElementById('venueForm').reset();
                document.getElementById('venueId').value = '';
            }
        }
        
        // Закрыть модалку
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        // Редактирование
        function editVenue(id) {
            const venue = venues.find(v => v.id === id);
            if (venue) openModal(venue);
        }
        
        // Удаление
        async function deleteVenue(id) {
            if (!confirm('Удалить площадку? Все бронирования тоже удалятся!')) return;
            
            try {
                const response = await fetch(`/api/admin/venues/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadVenues();
                } else {
                    alert('Ошибка удаления');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка удаления');
            }
        }
        
        // Сохранение формы
        document.getElementById('venueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const venueId = document.getElementById('venueId').value;
            const data = {
                name: document.getElementById('name').value,
                sport: document.getElementById('sport').value,
                location: document.getElementById('location').value,
                price: parseInt(document.getElementById('price').value) || 0,
                coords_lat: document.getElementById('coords_lat').value || null,
                coords_lng: document.getElementById('coords_lng').value || null,
                image: document.getElementById('image').value || null
            };
            
            try {
                const url = venueId ? `/api/admin/venues/${venueId}` : '/api/admin/venues';
                const method = venueId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    closeModal();
                    loadVenues();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Ошибка сохранения');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка сохранения');
            }
        });
        
        // Закрытие по клику вне модалки
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        // Загрузка при старте
        loadVenues();
    </script>
</body>
</html>
